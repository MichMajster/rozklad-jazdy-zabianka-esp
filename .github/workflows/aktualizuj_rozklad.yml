name: Automatyczna Aktualizacja Rozkładu

on:
  schedule:
    # Uruchamiaj skrypt codziennie o godzinie 03:00 i 15:00 czasu UTC
    # Możesz dostosować godziny za pomocą zapisu cron
    - cron: '0 * * * *'
  workflow_dispatch: # Pozwala też na ręczne uruchomienie przyciskiem na GitHubie

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Pobranie kodu repozytorium na serwer GitHuba
    - name: Klonowanie repozytorium
      uses: actions/checkout@v4

    # 2. Instalacja Pythona w najnowszej wersji
    - name: Konfiguracja Pythona
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Instalacja wymaganych bibliotek (requests, beautifulsoup4)
    - name: Instalacja bibliotek
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Uruchomienie Twojego skryptu (upewnij się, że nazwa pliku się zgadza!)
    - name: Uruchomienie skryptu scrapującego
      run: python skrypt.py

# 5. Automatyczny commit i push zaktualizowanego pliku rozklad.json z powrotem do repozytorium
    - name: Zapisanie zmian w repozytorium
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Upewniamy się, że plik istnieje lub tworzymy pusty, jeśli skrypt go nie wygenerował z powodu błędu 403
        touch rozklad.json 
        
        git add rozklad.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automatyczna aktualizacja rozkładu jazdy" && git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main)
